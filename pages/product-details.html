<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="screen-orientation" content="portrait">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chi tiết sản phẩm | Song Phương</title>

    <!-- Ionic CSS -->
    <link rel="stylesheet" href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css">
    <link rel="stylesheet" href="../css/ionic.min.css">

    <!-- BuildPC Dependencies -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/home-style.css">
    <link rel="stylesheet" href="../css/product-details.css">
</head>

<body>
    <div class="ion-app">
        <!-- Header -->
        <header class="song-phuong-header">
            <div class="header-container">
                <div class="back-btn" onclick="goBack()">
                    <i class="icon ion-ios-arrow-back"></i>
                </div>

                <div class="header-search-fixed">
                    <input type="text" class="search-input" placeholder="Tìm kiếm sản phẩm...">
                </div>

                <div class="cart-btn">
                    <img src="../icons/cart-icon.png" alt="Giỏ hàng" class="cart-icon-img">
                    <span class="cart-badge">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="product-details-container">
            <!-- Image Showcase Section -->
            <section class="product-showcase">
                <div class="main-image-container">
                    <img id="mainProductImage" class="main-product-image" src="" alt="Hình sản phẩm">
                </div>
                <div class="thumbnail-gallery" id="thumbnailGallery">
                    <!-- Thumbnails will be loaded dynamically -->
                </div>
            </section>

            <!-- Product Info Section (two-column: main + aside) -->
            <section class="product-info-section">
                <div class="product-info-grid">
                    <div class="product-info-main">
                        <!-- Product Title -->
                        <h1 class="product-title" id="productTitle">Tên sản phẩm</h1>

                        <!-- SKU, Warranty, Rating Row -->
                        <div class="product-meta-row">
                            <div class="product-sku">
                                <span class="meta-label">SKU:</span>
                                <span class="meta-value" id="productSku">000000</span>
                            </div>
                            <div class="product-warranty">
                                <span class="meta-label">Bảo hành:</span>
                                <span class="meta-value" id="productWarranty">12 tháng</span>
                            </div>
                            <div class="product-rating" id="productRating">
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                            </div>
                        </div>

                        <!-- Short Description with Bullet Points -->
                        <div class="product-short-description">
                            <ul class="description-bullets" id="descriptionBullets">
                                <!-- Bullets will be loaded dynamically -->
                            </ul>
                            <button class="expand-btn" id="expandDescBtn" onclick="toggleDescription()">
                                <span id="expandBtnText">XEM THÊM</span>
                                <i class="fas fa-chevron-down" id="expandBtnIcon"></i>
                            </button>
                        </div>
                    </div>

                    <aside class="product-info-aside">
                        <!-- Price Section (styled box) -->
                        <div class="product-price-box">
                            <div class="price-row-line">
                                <span class="price-label">Giá niêm yết:</span>
                                <span class="original-price" id="originalPrice">0đ</span>
                            </div>
                            <div class="price-row-line sale" id="salePriceRow">
                                <span class="price-label">Giá khuyến mãi:</span>
                                <span class="sale-price" id="salePrice">0đ</span>
                            </div>
                            <div class="vat-note">(Đã bao gồm VAT)</div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="action-buttons aside-actions">
                            <button class="btn-add-cart" onclick="addToCart()">
                                <i class="fas fa-shopping-cart"></i>
                                MUA NGAY
                            </button>
                            <button class="btn-consult" onclick="callConsult()">
                                <i class="fas fa-phone-alt"></i>
                                TƯ VẤN MUA HÀNG
                            </button>
                            <button class="btn-zalo" onclick="openZalo()">
                                <i class="fas fa-comment-dots"></i>
                                NHẮN TIN
                            </button>
                        </div>
                        <p class="consult-note">Tư vấn - Mua hàng xin vui lòng gọi <strong>02633 999979</strong></p>
                    </aside>
                </div>
                <!-- Specs Button removed from here and moved under product description -->
            </section>

            <!-- Specs Modal (hidden by default, shown when clicking button) -->
            <div class="specs-modal" id="specsModal" aria-hidden="true">
                <div class="specs-modal-content" role="dialog" aria-labelledby="specsTitle">
                    <button class="specs-modal-close" aria-label="Đóng" onclick="closeSpecsModal()">×</button>
                    <div class="section-header">
                        <h2 id="specsTitle">Thông số kỹ thuật</h2>
                    </div>
                    <div class="specs-table" id="specsTable">
                        <!-- Specs will be loaded dynamically -->
                    </div>
                </div>
            </div>

            <!-- Product Description Section -->
            <section class="product-description-section">
                <div class="section-header">
                    <h2>Mô tả sản phẩm</h2>
                </div>
                <div class="product-full-description" id="productFullDescription">
                    <!-- Full description will be loaded dynamically -->
                </div>
                <div style="margin-top:12px; text-align:center;">
                    <button class="btn-view-specs" onclick="openSpecsModal()">
                        <i class="fas fa-list-ul"></i>
                        XEM THÔNG SỐ KỸ THUẬT CHI TIẾT
                    </button>
                </div>
            </section>

            <!-- Reviews Section -->
            <section class="product-reviews-section">
                <div class="section-header">
                    <h2>Đánh giá & Nhận xét</h2>
                </div>

                <!-- Rating Summary -->
                <div class="rating-summary">
                    <div class="rating-average">
                        <span class="rating-number" id="avgRating">4.8</span>
                        <div class="rating-stars" id="avgRatingStars">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star-half-alt"></i>
                        </div>
                        <span class="total-reviews" id="totalReviews">12 đánh giá</span>
                    </div>
                    <div class="rating-breakdown">
                        <div class="rating-bar">
                            <span class="rating-label">5 <i class="fas fa-star"></i></span>
                            <div class="bar-container"><div class="bar-fill" style="width: 75%"></div></div>
                            <span class="rating-count">9</span>
                        </div>
                        <div class="rating-bar">
                            <span class="rating-label">4 <i class="fas fa-star"></i></span>
                            <div class="bar-container"><div class="bar-fill" style="width: 16%"></div></div>
                            <span class="rating-count">2</span>
                        </div>
                        <div class="rating-bar">
                            <span class="rating-label">3 <i class="fas fa-star"></i></span>
                            <div class="bar-container"><div class="bar-fill" style="width: 8%"></div></div>
                            <span class="rating-count">1</span>
                        </div>
                        <div class="rating-bar">
                            <span class="rating-label">2 <i class="fas fa-star"></i></span>
                            <div class="bar-container"><div class="bar-fill" style="width: 0%"></div></div>
                            <span class="rating-count">0</span>
                        </div>
                        <div class="rating-bar">
                            <span class="rating-label">1 <i class="fas fa-star"></i></span>
                            <div class="bar-container"><div class="bar-fill" style="width: 0%"></div></div>
                            <span class="rating-count">0</span>
                        </div>
                    </div>
                </div>

                <!-- Write Review Button -->
                <button class="btn-write-review" onclick="openReviewForm()">
                    <i class="fas fa-pen"></i>
                    VIẾT ĐÁNH GIÁ
                </button>

                <!-- Reviews List -->
                <div class="reviews-list" id="reviewsList">
                    <!-- Reviews will be loaded dynamically -->
                </div>
            </section>
        </div>

        <!-- Review Form Modal -->
        <div class="review-modal" id="reviewModal">
            <div class="review-modal-content">
                <div class="modal-header">
                    <h3>Viết đánh giá</h3>
                    <button class="modal-close" onclick="closeReviewForm()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="review-rating-select">
                        <span>Đánh giá của bạn:</span>
                        <div class="star-select" id="starSelect">
                            <i class="fas fa-star" data-rating="1"></i>
                            <i class="fas fa-star" data-rating="2"></i>
                            <i class="fas fa-star" data-rating="3"></i>
                            <i class="fas fa-star" data-rating="4"></i>
                            <i class="fas fa-star" data-rating="5"></i>
                        </div>
                    </div>
                    <input type="text" class="review-input" id="reviewerName" placeholder="Họ và tên">
                    <textarea class="review-textarea" id="reviewContent" placeholder="Nhập nhận xét của bạn..."></textarea>
                    <button class="btn-submit-review" onclick="submitReview()">GỬI ĐÁNH GIÁ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../js/jquery.min.js"></script>
    <script src="../js/product-details.js"></script>
</body>

</html>
