<div class="oneshop-buildpc ob">
    <div class="ob-main-loader">
        <div class="wrap-loader">
            <div class="oneshop-loader"></div>
        </div>
    </div>
    <!-- header -->
    <div class="ob-header">
        <div class="ob-primary">
            <div class="ob-tabs">
                <button type="button" tab="0" class="ob-btn btn-select-tab selected">
                    Cấu hình 1 </button>
                <button type="button" tab="1" class="ob-btn btn-select-tab ">
                    Cấu hình 2 </button>
                <button type="button" tab="2" class="ob-btn btn-select-tab ">
                    Cấu hình 3 </button>
                <input type="hidden" name="tab" value="0">
            </div>
            <button type="button" class="ob-btn btn-reset">
                <i class="icon fas fa-sync-alt"></i>
                <span class="text">Build lại</span>
            </button>
        </div>
        <div class="ob-sidebar"></div>
    </div>
    <!-- body -->
    <div class="ob-body">
        <div class="ob-primary">
            <div class="ob-content"></div>
        </div>
        <div class="ob-sidebar">
            <div class="oneshop-buildpc__actions oneshop-buildpc--box">
                <div class="total d-none d-lg-flex">
                    <span class="text">Chi phí dự tính:</span>
                    <span class="count">0 sản phẩm</span>
                    <span class="amount">0 đ</span>
                </div>
                <button type="button" id="addtocart" class="btn addtocart">Thêm vào giỏ</button>
                <button type="button" id="buynow" class="btn buynow">Mua ngay</button>
            </div>
            <div class="oneshop-buildpc__actions oneshop-buildpc--box">
                <button type="button" id="sharefb" class="btn share-fb">Share cấu hình</button>
                <button type="button" id="export-image" class="btn export-image">Tải ảnh cấu
                    hình</button>
                <button type="button" id="export-excel" class="btn export-excel">Tải excel cấu
                    hình</button>
            </div>
        </div>
    </div>
    <!-- footer -->
    <div class="ob-footer">
        <div class="total">
            <span class="text">Chi phí dự tính:</span>
            <span class="count">0 sản phẩm</span>
            <span class="amount"></span>
        </div>
    </div>
</div>
